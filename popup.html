<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="logo" aria-hidden="true">
          <img src="icons/icon48.png" width="36" height="36" alt="" />
        </div>
        <div>
          <div class="brand-title">Lasso</div>
          <div class="brand-subtitle">Capture any part of the page</div>
        </div>
      </header>

      <main class="actions">
        <button id="btn-visible" class="action-btn" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="M7 9h10" />
            </svg>
          </span>
          <span class="action-copy">
            <span class="action-title">Visible</span>
            <span class="action-desc">Screenshot the current viewport</span>
          </span>
          <span class="action-chevron" aria-hidden="true">›</span>
        </button>

        <button id="btn-fullpage" class="action-btn" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="4" y="3" width="16" height="18" rx="2" />
              <path d="M8 7h8M8 11h8M8 15h5" />
            </svg>
          </span>
          <span class="action-copy">
            <span class="action-title">Full Page</span>
            <span class="action-desc">Scroll and stitch the entire page</span>
          </span>
          <span class="action-chevron" aria-hidden="true">›</span>
        </button>

        <button id="btn-pick" class="action-btn" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M5 5l4 4" />
              <rect
                x="7"
                y="7"
                width="12"
                height="12"
                rx="1"
                stroke-dasharray="3 2"
              />
              <circle cx="5" cy="5" r="1.5" fill="currentColor" stroke="none" />
            </svg>
          </span>
          <span class="action-copy">
            <span class="action-title">Pick</span>
            <span class="action-desc">Select an element on the page</span>
          </span>
          <span class="action-chevron" aria-hidden="true">›</span>
        </button>

        <button id="btn-freestyle" class="action-btn" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect
                x="4"
                y="6"
                width="16"
                height="12"
                rx="1"
                stroke-dasharray="4 3"
              />
              <path d="M4 6l6 6M20 18l-6-6" />
            </svg>
          </span>
          <span class="action-copy">
            <span class="action-title">Freestyle</span>
            <span class="action-desc">Drag to draw your own region</span>
          </span>
          <span class="action-chevron" aria-hidden="true">›</span>
        </button>
      </main>

      <footer class="footer">
        <label class="setting">
          <input type="checkbox" id="hide-fixed" />
          <span class="setting-track" aria-hidden="true"></span>
          <span class="setting-label">Hide fixed elements during capture</span>
        </label>

        <div class="api-key">
          <label class="api-key-label" for="gemini-key">Gemini API key</label>
          <div class="api-key-row">
            <input
              type="password"
              id="gemini-key"
              class="api-key-input"
              placeholder="Paste your Gemini API key"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="gemini-save" class="api-key-save">
              Save
            </button>
          </div>
          <p class="api-key-hint">
            Powers the <strong>Text</strong> button. The selected image is sent
            to Google Gemini.
            <a
              href="https://aistudio.google.com/apikey"
              target="_blank"
              rel="noopener"
              >Get a key</a
            >
          </p>
        </div>
      </footer>
    </div>
    <script src="messages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
